<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="72-hour emergency survival kit backpack">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sky)"/>
  <rect x="0" y="390" width="800" height="110" fill="#c4b5fd"/>

  <rect x="255" y="120" width="290" height="300" rx="44" fill="url(#bag)"/>
  <rect x="295" y="90" width="210" height="55" rx="25" fill="#5b21b6"/>
  <rect x="330" y="72" width="140" height="32" rx="16" fill="#4c1d95"/>

  <rect x="312" y="190" width="176" height="90" rx="18" fill="#a78bfa"/>
  <rect x="312" y="300" width="176" height="70" rx="16" fill="#8b5cf6"/>

  <path d="M360 235h80" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <path d="M400 195v80" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <rect x="225" y="200" width="28" height="120" rx="14" fill="#5b21b6"/>
  <rect x="547" y="200" width="28" height="120" rx="14" fill="#5b21b6"/>

  <circle cx="160" cy="110" r="28" fill="#22c55e"/>
  <text x="160" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">72h</text>

  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1e293b">72-Hour Emergency Survival Kit</text>
</svg>
